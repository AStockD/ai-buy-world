services:
  postgres:
    image: postgres:16-alpine
    container_name: abw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aibuyworld
      POSTGRES_PASSWORD: aibuyworld_dev
      POSTGRES_DB: aibuyworld
    volumes:
      - abw_pgdata:/var/lib/postgresql/data
    networks:
      abw_net:
        ipv4_address: 172.24.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibuyworld"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: abw-redis
    restart: unless-stopped
    volumes:
      - abw_redisdata:/data
    networks:
      abw_net:
        ipv4_address: 172.24.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: abw-server
    restart: unless-stopped
    ports:
      - "3004:3001"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      abw_net:
        ipv4_address: 172.24.0.20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://172.23.1.224:3004/api
    container_name: abw-web
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    env_file:
      - .env.docker
    depends_on:
      - server
    networks:
      abw_net:
        ipv4_address: 172.24.0.30

networks:
  abw_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16

volumes:
  abw_pgdata:
  abw_redisdata:
